<!DOCTYPE html>
<html>
<head>
  <title>Zomato Orders</title>
</head>
<body>

<h2>Orders</h2>
<ul id="orders"></ul>

<script>
  const data = [
    { _id: "1", title: "Order 1", description: "Demo order" },
    { _id: "2", title: "Order 2", description: "Demo order" }
  ];

  const list = document.getElementById("orders");

  data.forEach(order => {
    const li = document.createElement("li");
    li.textContent = order.title + " - " + order.description;
    list.appendChild(li);
  });
</script>

</body>
</html>
